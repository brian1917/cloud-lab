- name: Setup AWS jumphost - public IP
  hosts: aws_jh_pub
  tags:
    - aws_jh_pub
  vars_files:
    - vars.yaml
  roles:
    - aws-jumphost
  tasks:
    
    - name: Ensure ansible directory exists
      ansible.builtin.file:
        path: /home/{{ ansible_user }}/ansible
        state: directory
        mode: '0755'
    - name: Copy contents to ansible directory on the remote host
      ansible.posix.synchronize:
        src: ./  # Adjust this path to the directory you want to copy from, if necessary
        dest: /home/{{ ansible_user }}/ansible
        rsync_opts:
          - "--exclude=roles/pce/files"
    
    - name: Create the remote terraform configuration directories if it doesn't exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'  # Adjust permissions as needed
      with_items: ["terraform", "terraform/config-files" ]
   
    - name: Copy terraform configuration files to the jumphost
      copy:
        src: "{{ item }}"
        dest: "terraform/{{ item | basename }}"
      with_items: ["{{ vars.azure_config_file }}", "{{ vars.aws_config_file }}" ]

    - name: Install ansible on the remote host if not already installed
      ansible.builtin.shell: |
        if ! command -v ansible > /dev/null; then
          sudo apt update && sudo apt install ansible -y
        fi
      args:
        executable: /bin/bash

- name: Setup Azure jumphost
  hosts: azure_jh
  vars_files:
    - vars.yaml
  roles: 
    - azure-jumphost
  tasks:
    - name: Install ansible on the remote host if not already installed
      ansible.builtin.shell: |
        if ! command -v ansible > /dev/null; then
          sudo apt update && sudo apt install ansible -y
        fi
      args:
        executable: /bin/bash

- name: Setup PCE
  hosts: pce
  tags:
    - never
    - pce
  vars_files:
    - vars.yaml
  roles:
    - pce
  become: true
